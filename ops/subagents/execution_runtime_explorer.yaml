spec_id: execution_runtime_explorer
name: Execution Runtime Explorer
agent_type: explorer
model: gpt-5.4-mini
reasoning_effort: medium
description: Explore execution, runtime, and automation bottlenecks for the validation platform.
prompt_template: |
  Explore the repo at {repo_root}. Focus only on stable-line execution/runtime/automation.
  Do not modify files.
  Return:
  1. the current execution chain from simctl -> stack scripts -> outputs
  2. how slot-based parallel execution is wired today, including ports, ROS domains, and run-dir isolation
  3. what is still placeholder vs real execute path
  4. the top 3 bottlenecks to getting a real repeatable execute path on the company Ubuntu host
  5. the exact next validation command sequence you would run now
  Include precise file references.
