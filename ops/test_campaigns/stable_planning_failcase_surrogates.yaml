campaign_id: stable_planning_failcase_surrogates
description: Stable-line executable CARLA surrogate campaign for road-test-derived planning/control failcase families.
owner: planning-control
default_run_root: runs/campaign_stable_planning_failcase_surrogates
default_slot: stable-slot-01
stop_after_each: true
cooldown_sec: 60
report: true
bugpack:
  enabled: true
  owner: planning-control
  output_dir: bugpack
  include_infra: false
loop:
  default_run_root: runs/continuous_stable_planning_failcase_surrogates
  max_rounds: 1
  round_sleep_sec: 120
  recommended_parallel: 1
  parallel_note: >
    Use --parallel 1 on the company Ubuntu host by default. Raise only after
    pix-host-readiness confirms enough memory, swap, disk, and free ports for
    another full CARLA+Autoware slot.
validation_path: >
  simctl campaign --config ops/test_campaigns/stable_planning_failcase_surrogates.yaml
  --slot stable-slot-01 --execute --keep-going
loop_validation_path: >
  simctl campaign-loop --config ops/test_campaigns/stable_planning_failcase_surrogates.yaml
  --execute --max-rounds 0 --parallel 1 --require-validation
handoff_path: >
  simctl bugpack --run-root runs/campaign_stable_planning_failcase_surrogates
  --output-dir runs/campaign_stable_planning_failcase_surrogates/bugpack
rollback_impact: Disable this campaign and continue the broader stable_planning_control_bughunt campaign; no stack profile or runtime code is changed by this campaign file.
blocked_followups:
  - id: public_road_route_empty_fixture
    reason: route-empty crash reproduction still needs deterministic lanelet/OpenDRIVE topology around the recorded road section
    owner: planning-control
  - id: mcap_actor_track_injection
    reason: exact road-test object and ego trajectories are still external to Git and need a direct replay or actor-track extraction harness
    owner: planning-control
  - id: takeover_signal_kpi
    reason: brake-takeover and gear-state signals are not yet emitted by the CARLA surrogate probes
    owner: planning-control
scenarios:
  - id: stable_l2_planning_roadtest_selected_failcase_replay_draft
    path: scenarios/l2/planning_roadtest_selected_failcase_replay_draft.yaml
    validation: true
    finalize: true
    execute: true
    tags:
      - stable
      - planning_control
      - road_test_replay
      - roadtest_surrogate
      - forced_lane_change
      - selected_failcase
    expected_observables:
      - lane_change_left_reference_nonempty_count>0
      - lane_change_left_candidate_nonempty_count>0
      - lane_change_no_safe_path_wall_count>0
      - manual_takeover_count>0
      - trajectory_jump_max_m>1.0
      - lateral_shift_m>0.5
      - planning_validator_invalid_count>0
  - id: stable_l2_planning_forced_lane_change_static_obstacle
    path: scenarios/l2/planning_forced_lane_change_static_obstacle.yaml
    validation: true
    finalize: true
    execute: true
    tags:
      - stable
      - robobus117th
      - planning_control
      - road_test_surrogate
      - forced_lane_change
      - static_obstacle
      - actor_bridge
    expected_observables:
      - sensor_topic_coverage=1.0
      - sensor_sample_coverage=1.0
      - dynamic_actor_response=1.0
      - actor_count_observed>=2
      - yield_response_count>=1
      - collision_count=0
      - min_ttc_sec>=1.8
  - id: stable_l2_planning_route_update_dropout_recovery
    path: scenarios/l2/planning_route_update_dropout_recovery.yaml
    validation: true
    finalize: true
    execute: true
    tags:
      - stable
      - robobus117th
      - planning_control
      - road_test_surrogate
      - route_update
      - trajectory_dropout
      - route_recovery
    expected_observables:
      - route_completion>=0.98
      - route_goal_lateral_error_m<=0.50
      - lateral_error_m<=0.50
      - longitudinal_error_m<=0.8
      - jerk_mps3<=2.5
      - sensor_topic_coverage=1.0
      - sensor_sample_coverage=1.0
  - id: stable_l2_planning_out_of_lane_slowdown_takeover
    path: scenarios/l2/planning_out_of_lane_slowdown_takeover.yaml
    validation: true
    finalize: true
    execute: true
    tags:
      - stable
      - robobus117th
      - planning_control
      - road_test_surrogate
      - out_of_lane
      - slowdown
      - brake_takeover
      - actor_bridge
    expected_observables:
      - sensor_topic_coverage=1.0
      - sensor_sample_coverage=1.0
      - dynamic_actor_response=1.0
      - collision_count=0
      - min_ttc_sec>=1.8
