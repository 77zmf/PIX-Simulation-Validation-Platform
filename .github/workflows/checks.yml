name: checks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Smoke the CLI
        env:
          PYTHONPATH: src
        run: |
          python -m simctl bootstrap --stack stable
          python -m simctl run --scenario scenarios/l0/smoke_stub.yaml --run-root ci_runs
          python -m simctl report --run-root ci_runs
