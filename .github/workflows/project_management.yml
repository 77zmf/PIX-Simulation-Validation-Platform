name: project-management

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1-5"

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Generate project digest
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TEAM_REMINDER_TO: ${{ secrets.TEAM_REMINDER_TO }}
          TEAM_REMINDER_CC: ${{ secrets.TEAM_REMINDER_CC }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            export GH_TOKEN="$GITHUB_TOKEN"
          fi
          python -m simctl digest --config ops/project_automation.yaml --output-dir automation_outputs/project_digest --send-email

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-digest
          path: automation_outputs/project_digest

      - name: Publish digest issue
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python tools/publish_digest_issue.py \
            --repo pixmoving-moveit/zmf_ws \
            --digest automation_outputs/project_digest/digest.md \
            --summary automation_outputs/project_digest/digest_summary.json

      - name: Publish step summary
        run: cat automation_outputs/project_digest/digest.md >> "$GITHUB_STEP_SUMMARY"
