name: codex-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  codex:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}" "+refs/pull/${{ github.event.pull_request.number }}/head"

      - name: Check Codex secret availability
        id: codex_secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "Codex PR review skipped."
              echo
              echo "Reason: OPENAI_API_KEY is unavailable to this workflow run."
              echo "This is expected for fork-origin pull_request events or repositories without the secret configured."
            } > codex-pr-review.md
          fi

      - name: Run Codex PR review
        id: run_codex
        if: steps.codex_secret.outputs.available == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr_review.md
          output-file: codex-pr-review.md
          model: gpt-5.4
          safety-strategy: drop-sudo
          sandbox: workspace-write

      - name: Ensure Codex review artifact
        if: always()
        run: |
          if [ ! -s codex-pr-review.md ]; then
            {
              echo "Codex PR review unavailable."
              echo
              echo "The optional Codex review action did not produce codex-pr-review.md."
              echo "Treat this as CI hygiene only; use the regular test check for merge-blocking validation."
            } > codex-pr-review.md
          fi

      - name: Upload Codex review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-pr-review
          path: codex-pr-review.md

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
