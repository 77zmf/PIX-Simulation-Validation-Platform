      y: 0.955
      z: 1.1045
    distance_m: 20.467825
    peak_speed_mps: 5.080839
    speed_after_brake_mps: 0.010979
    runtime_binary_sha256: ab94d7fe1372fe6a322d2cd5ea6d8e94a5b35da1c9e4ab69334b953e6915d778
    runtime_binary_backup: /home/pixmoving/CARLA_0.9.15/CarlaUE4/Binaries/Linux/CarlaUE4-Linux-Shipping.zmf-bbox-bak-20260425T042812Z
  wheel_blueprint_source_inspect:
    date: "2026-05-11"
    script: assets/vehicles/robobus117th/unreal/inspect_robobus_wheel_blueprints.py
    log: /tmp/pix_inspect_robobus_wheels_capture_20260511T155254Z.log
    status: passed
    observed:
