        y: 1.046481
        z: 0.099537
      front_left_steer_left_deg: 19.227951
      front_right_steer_left_deg: 23.192797
      front_left_steer_right_deg: -23.192797
      front_right_steer_right_deg: -19.227951
    notes:
      - Direct runtime control, braking, wheel geometry, and CARLA wheel steer API are validated.
      - Strict CARLA bbox/collision acceptance is not validated; the observed bbox x/z extents are too small for the Robobus physical footprint.
      - Visible PIX tire animation is not accepted by this gate; it requires native UE4 VehicleMesh/AnimBP/PhysicsAsset authoring.
  latest_wheel_blueprint_source_inspect:
    date: "2026-05-11"
    script: assets/vehicles/robobus117th/unreal/inspect_robobus_wheel_blueprints.py
    log: /tmp/pix_inspect_robobus_wheels_capture_20260511T155254Z.log
    status: passed
