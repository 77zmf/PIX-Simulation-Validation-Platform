toolchain_gates:
  can_collect_source_package:
    required_tools:
      - bash
      - python3
  can_prepare_unreal_mesh_inputs:
    preferred_tools:
      - blender
    fallback_tools:
      - assimp
  can_create_or_edit_uassets:
    required_tools:
      - UE4Editor
      - UE4Editor-Cmd
  can_cook_package:
    required_tools:
      - RunUAT.sh
      - UnrealPak
  can_runtime_verify:
    required_tools:
      - python3
      - carla Python module
      - running CARLA server
validation_gates:
  source_package_gate:
    command: bash assets/vehicles/robobus117th/scripts/check_blueprint_readiness.sh --strict-source
    expected: Source package, mesh, vehicle info, sensor calibration, and CARLA runtime are present.
  unreal_input_gate:
    command: bash assets/vehicles/robobus117th/scripts/prepare_unreal_mesh_inputs.sh
    expected: FBX or OBJ import input exists under artifacts/carla_blueprints/robobus117th_source/unreal_import.
  runtime_blueprint_gate:
    command: python3 assets/vehicles/robobus117th/scripts/verify_carla_blueprint.py --blueprint-id vehicle.pixmoving.robobus
    expected: CARLA blueprint library contains vehicle.pixmoving.robobus.
  runtime_vehicle_blueprint_acceptance_gate:
    command: simctl run --scenario scenarios/l0/robobus117th_vehicle_blueprint_acceptance.yaml --run-root runs/robobus117th_vehicle_blueprint --slot stable-slot-01 --execute && simctl validate --run-dir <run_dir> --execute --finalize
    expected: The non-destructive metric probe reports a live vehicle.pixmoving.robobus ego actor with plausible bbox/collision extents, matching wheel geometry, and all 13 production sensor actors attached.
    current_status: excludes_wheel_width_because_carla_0_9_15_runtime_api_does_not_expose_it
  direct_actor_drive_gate:
    command: python3 assets/vehicles/robobus117th/scripts/validate_carla_direct_pix_actor.py --host 127.0.0.1 --port 2000 --run-dir runs/robobus_direct_actor_validation --actor-id vehicle.pixmoving.robobus --record-video
    expected: vehicle.pixmoving.robobus spawns as one CARLA actor, drives more than 5 m, reaches more than 1.5 m/s, stays below 12 deg pitch/roll, and writes screenshots/video plus direct_pix_actor_summary.json.
  strict_direct_actor_acceptance_gate:
    command: python3 assets/vehicles/robobus117th/scripts/validate_carla_vehicle_acceptance.py --host 127.0.0.1 --port 2000 --run-dir runs/robobus_vehicle_acceptance --actor-id vehicle.pixmoving.robobus --strict-bbox
    expected: In an isolated CARLA session, throttle, brake, steering, wheel geometry, stability, and bbox/collision plausibility all pass.
    current_status: wheel_width_must_be_verified_from_ue4_source_not_carla_runtime_api
  closed_loop_gate:
    command: simctl run --scenario scenarios/l0/robobus117th_town01_closed_loop.yaml --run-root runs/robobus117th_bridge --slot stable-slot-01 --execute
    expected: planning_control_smoke passes with the robobus blueprint selected.
rollback:
  scenario_field: execution.stable_runtime.carla_vehicle_type
  fallback_value: vehicle.toyota.prius
  command_hint: Revert carla_vehicle_type and rerun the same L0 smoke scenario.
