asset_id: robobus117th_carla_vehicle_authoring_requirements
target_blueprint_id: vehicle.pixmoving.robobus
target_runtime:
  carla_version: 0.9.15
  unreal_engine: 4.26
authoring_goal:
  stable_line_goal: Spawn a CARLA ego actor visually and physically aligned with the Autoware robobus model.
  first_acceptable_step: Direct CARLA actor vehicle.pixmoving.robobus with PIX visual mesh and stable carrier physics.
  full_driveable_step: Native CARLA vehicle blueprint with mesh, wheels, collision, physics asset, movement tuning, and cooked Linux assets.
current_runtime_state:
  date: "2026-04-19"
  status: direct_actor_drive_validated
  method: single_carla_actor_with_pix_visual_child_and_stable_carrier_physics
  runtime: /home/pixmoving/CARLA_0.9.15
  source_toolchain: /home/pixmoving/zmf_ws/source_toolchain/carla-0.9.15
  validation_run_dir: /home/pixmoving/PIX-Simulation-Validation-Platform/runs/robobus_single_actor_visual_20260419T080120Z/direct_single_actor_visual_validation_20260419T081239Z
  observed:
    actor_id: vehicle.pixmoving.robobus
    map: Carla/Maps/Town10HD_Opt
    passed: true
    distance_m: 29.318075
    max_speed_mps: 5.150921
    max_abs_pitch_deg: 0.119542
    max_abs_roll_deg: 0.810883
    evidence:
      - pix_robobus_direct_start.png
      - pix_robobus_direct_after_drive.png
      - vehicle_pixmoving_robobus_direct_drive.mp4
      - direct_pix_actor_summary.json
  limits:
    - The PIX visual is inside the same CARLA actor, not an external follower or overlay actor.
    - The current physics and collision path still uses the stable carrier baseline.
    - Native PIX PhysicsAsset, wheel visual animation, and two-wheel/four-wheel steering mode validation remain follow-up work.
  latest_acceptance:
    date: "2026-04-19"
    run_dir: /home/pixmoving/PIX-Simulation-Validation-Platform/runs/robobus_stable_vehicle_acceptance_20260419T153114Z/vehicle_acceptance
    passed: true
    observed:
      distance_m: 23.106969
      peak_speed_mps: 4.725591
      speed_before_brake_mps: 4.725591
      speed_after_brake_mps: 0.033951
      front_left_steer_left_deg: 19.227951
      front_right_steer_left_deg: 23.192797
      front_left_steer_right_deg: -23.192797
      front_right_steer_right_deg: -19.227951
    notes:
      - Direct runtime control, braking, wheel geometry, and CARLA wheel steer API are validated.
      - Visible PIX tire animation is not accepted by this gate; it requires native UE4 VehicleMesh/AnimBP/PhysicsAsset authoring.
  native_vehicle_mesh_experiment:
    date: "2026-04-19"
    status: blocked_and_rolled_back
    script: assets/vehicles/robobus117th/unreal/configure_robobus_native_vehicle_mesh.py
    result: The PIX skeletal mesh can be loaded and cooked, but direct VehicleMesh replacement made vehicle.pixmoving.robobus fail normal CARLA spawn validation.
    stable_line_decision: Keep the existing spawnable single-actor PIX visual plus carrier physics until a native PIX PhysicsAsset or copy-pose visual component is validated.
  pixvisual_copypose_path:
    date: "2026-04-19"
    script: assets/vehicles/robobus117th/unreal/configure_robobus_pixvisual_copypose.py
    target_component: PixVisualMesh1_GEN_VARIABLE
    target_mesh: /Game/Carla/Static/Vehicles/4Wheeled/Robobus117thFusoSkelScale1/SKM_robobus117th_axis_safe.SKM_robobus117th_axis_safe_robobus_part_000_Object_________1_6
    intent: Keep the hidden FusoRosa VehicleMesh as the stable physics and AnimBP carrier, while the visible PIX mesh copies that animated pose for visual wheel steering.
    validation_required:
      - UE4 reload must show PixVisualMesh1_GEN_VARIABLE has master_pose_component bound to VehicleMesh.
      - CARLA runtime must still spawn vehicle.pixmoving.robobus.
      - Direct drive video must show PIX vehicle movement; close-up screenshots should be used for visible wheel-steer review.
source_inputs:
  required:
    - artifacts/carla_blueprints/robobus117th_source/source/install/robobus_description/mesh/robobus.dae
    - artifacts/carla_blueprints/robobus117th_source/source/install/robobus_description/config/vehicle_info.param.yaml
    - artifacts/carla_blueprints/robobus117th_source/source/install/robobus_description/urdf/vehicle.xacro
    - artifacts/carla_blueprints/robobus117th_source/source/parameter/sensor_kit/robobus_sensor_kit_description/extrinsic_parameters/sensors_calibration.yaml
    - assets/sensors/carla/robobus117th_sensor_mapping.yaml
  generated_optional:
    - artifacts/carla_blueprints/robobus117th_source/unreal_import/robobus.fbx
    - artifacts/carla_blueprints/robobus117th_source/unreal_import/robobus.obj
