      front_shape_width_cm: 25.0
      rear_shape_width_cm: 25.0
      front_steer_angle_deg: 28.991
      rear_steer_angle_deg: 0.0
    decision:
      - CARLA 0.9.15 runtime physics API does not expose wheel width, so runtime width=0 is not a valid asset failure.
      - Continue 40km/h route-follow drift triage through movement tuning, center of mass, actuation bridge, steering feedback, and route/map consistency.
