# CARLA bridge mapping for the PixRover1.2-1.5/117th robobus sensor kit.
# The normal autoware_carla_interface consumes this file together with
# robobus117th_sensor_kit_calibration.yaml copied into the sensor kit package.

default_sensor_kit_name: robobus_sensor_kit_description

sensor_mappings:
  lidar_ft_base_link:
    carla_type: sensor.lidar.ray_cast
    id: top
    ros_config:
      frame_id: lidar_ft_base_link
      topic_base: /sensing/lidar/top
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 100
      channels: 64
      points_per_second: 200000
      upper_fov: 10.0
      lower_fov: -30.0
      rotation_frequency: 20
      noise_stddev: 0.0

  lidar_fl_base_link:
    carla_type: sensor.lidar.ray_cast
    id: left
    ros_config:
      frame_id: lidar_fl_base_link
      topic_base: /sensing/lidar/left
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 80
      channels: 32
      points_per_second: 100000
      upper_fov: 10.0
      lower_fov: -30.0
      rotation_frequency: 20
      noise_stddev: 0.0

  lidar_fr_base_link:
    carla_type: sensor.lidar.ray_cast
    id: right
    ros_config:
      frame_id: lidar_fr_base_link
      topic_base: /sensing/lidar/right
      topic_suffix: /pointcloud_before_sync
      frequency_hz: 11
      qos_profile: best_effort
    parameters:
      range: 80
      channels: 32
      points_per_second: 100000
      upper_fov: 10.0
      lower_fov: -30.0
      rotation_frequency: 20
      noise_stddev: 0.0

  camera0/camera_link:
    carla_type: sensor.camera.rgb
    id: CAM_FRONT
    ros_config:
      frame_id: camera0/camera_optical_link
      topic_image: /sensing/camera/CAM_FRONT/image_raw
      topic_info: /sensing/camera/CAM_FRONT/camera_info
      frequency_hz: 11
      qos_profile: reliable
    parameters:
      image_size_x: 1280
      image_size_y: 720
      fov: 70.0

  camera1/camera_link:
    carla_type: sensor.camera.rgb
    id: CAM_BACK
    ros_config:
      frame_id: camera1/camera_optical_link
      topic_image: /sensing/camera/CAM_BACK/image_raw
      topic_info: /sensing/camera/CAM_BACK/camera_info
      frequency_hz: 11
      qos_profile: reliable
    parameters:
      image_size_x: 1280
      image_size_y: 720
      fov: 100.0

  camera2/camera_link:
    carla_type: sensor.camera.rgb
    id: CAM_FRONT_LEFT
    ros_config:
      frame_id: camera2/camera_optical_link
      topic_image: /sensing/camera/CAM_FRONT_LEFT/image_raw
      topic_info: /sensing/camera/CAM_FRONT_LEFT/camera_info
      frequency_hz: 11
      qos_profile: reliable
    parameters:
      image_size_x: 1280
      image_size_y: 720
      fov: 90.0

  camera3/camera_link:
    carla_type: sensor.camera.rgb
    id: CAM_FRONT_RIGHT
    ros_config:
      frame_id: camera3/camera_optical_link
      topic_image: /sensing/camera/CAM_FRONT_RIGHT/image_raw
      topic_info: /sensing/camera/CAM_FRONT_RIGHT/camera_info
      frequency_hz: 11
      qos_profile: reliable
    parameters:
      image_size_x: 1280
      image_size_y: 720
      fov: 90.0

  camera4/camera_link:
    carla_type: sensor.camera.rgb
    id: CAM_BACK_LEFT
    ros_config:
      frame_id: camera4/camera_optical_link
      topic_image: /sensing/camera/CAM_BACK_LEFT/image_raw
      topic_info: /sensing/camera/CAM_BACK_LEFT/camera_info
      frequency_hz: 11
      qos_profile: reliable
    parameters:
      image_size_x: 1280
      image_size_y: 720
      fov: 90.0

  camera5/camera_link:
    carla_type: sensor.camera.rgb
    id: CAM_BACK_RIGHT
    ros_config:
      frame_id: camera5/camera_optical_link
      topic_image: /sensing/camera/CAM_BACK_RIGHT/image_raw
      topic_info: /sensing/camera/CAM_BACK_RIGHT/camera_info
      frequency_hz: 11
      qos_profile: reliable
    parameters:
      image_size_x: 1280
      image_size_y: 720
      fov: 90.0

  tamagawa/imu_link:
    carla_type: sensor.other.imu
    id: imu
    ros_config:
      frame_id: tamagawa/imu_link
      topic: /sensing/imu/tamagawa/imu_raw
      frequency_hz: 50
      qos_profile: reliable
    parameters:
      noise_accel_stddev_x: 0.0
      noise_accel_stddev_y: 0.0
      noise_accel_stddev_z: 0.0
      noise_gyro_stddev_x: 0.0
      noise_gyro_stddev_y: 0.0
      noise_gyro_stddev_z: 0.0

  gnss_link:
    carla_type: sensor.other.gnss
    id: gnss
    ros_config:
      frame_id: map
      topic: /sensing/gnss/pose_with_covariance
      frequency_hz: 2
      qos_profile: reliable
    parameters:
      noise_alt_stddev: 0.0
      noise_lat_stddev: 0.0
      noise_lon_stddev: 0.0
      noise_alt_bias: 0.0
      noise_lat_bias: 0.0
      noise_lon_bias: 0.0
    covariance:
      position_variance: 0.01
      orientation_variance: 1.0

normalization:
  strip_suffixes:
    - _base_link
    - _link
    - /camera_link

enabled_sensors:
  - lidar_ft_base_link
  - lidar_fl_base_link
  - lidar_fr_base_link
  - camera0/camera_link
  - camera1/camera_link
  - camera2/camera_link
  - camera3/camera_link
  - camera4/camera_link
  - camera5/camera_link
  - tamagawa/imu_link
  - gnss_link
