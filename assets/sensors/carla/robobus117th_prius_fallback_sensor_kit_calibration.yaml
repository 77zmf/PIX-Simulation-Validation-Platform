# CARLA-native fallback sensor poses for the 117th smoke scenario when the CARLA
# ego actor is still vehicle.toyota.prius. Keep this separate from the physical
# Robobus 117th calibration so the imported Robobus blueprint can switch back to
# a vehicle-specific calibration once its CARLA pose is fixed.
#
# autoware_carla_interface expects these values in CARLA vehicle coordinates:
# X-forward, Y-right, Z-up, angles in radians. It then subtracts half of the
# wheelbase from X when attaching sensors to the CARLA actor. With the default
# 2.85 m bridge wheelbase, add 1.425 m to the desired vehicle-center X offset.

sensor_kit_base_link:
  lidar_ft_base_link:
    x: 2.425
    y: 0.0
    z: 2.2
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
