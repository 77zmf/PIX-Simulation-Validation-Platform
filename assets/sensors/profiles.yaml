profiles:
  ground_truth_control_baseline:
    description: CARLA truth or simplified perception for planning-control bring-up
    sensors:
      - front_camera
      - imu
      - gnss
      - lidar
    truth_mode: enabled
  production_perception:
    description: Production-like perception wiring for real stack validation
    sensors:
      - front_camera
      - surround_cameras
      - imu
      - gnss
      - lidar
      - radar
    truth_mode: disabled
  robobus_pixrover14_application_topology:
    description: RoboBus PixRover1.4 topology, 6 autonomous-surround cameras plus 5 lidars
    sensors:
      - senyun_08bc_front_camera_x1
      - senyun_ar0233_surround_cameras_x5
      - robosense_m1plus_lidar_x2
      - robosense_airy_lidar_x2
      - robosense_e1r_lidar_x1
      - imu
      - gnss
    truth_mode: disabled
    catalog: assets/sensors/robobus_pixrover14_application_topology.yaml
  robobus_pixrover14_route_smoke_core:
    description: Qiyu custom-map planning/control smoke profile using the minimal 117th CARLA bridge sensors needed for stable route validation
    sensors:
      - robosense_m1plus_front_top_lidar_x1
      - imu
      - gnss
    truth_mode: disabled
    catalog: assets/sensors/robobus_pixrover14_application_topology.yaml
    containment:
      full_topology_acceptance_profile: robobus_pixrover14_application_topology
      reason: Avoid using the full 6-camera and 5-lidar load to validate qiyu map/route closure after the custom map reproduced a CARLA UE4 Signal 11 under full bridge load.
  carla0915_high_fidelity:
    description: CARLA 0.9.15 / UE4.26 high-fidelity camera stack for perception and shadow validation
    sensors:
      - cinematic_front_camera
      - wide_front_camera
      - surround_cameras
      - imu
      - gnss
      - lidar
    truth_mode: shadow
  reconstruction_capture:
    description: Capture profile for public-road map refresh and static geometry reconstruction
    sensors:
      - front_camera
      - surround_cameras
      - imu
      - gnss
      - lidar
    truth_mode: disabled
    deliverables:
      - rosbag2
      - calibration
      - aligned_pointcloud
      - lanelet_candidate
  reconstruction_dense_multiview_capture:
    description: Dense multiview capture profile for future static and dynamic Gaussian-splatting reconstruction
    sensors:
      - front_camera
      - surround_cameras
      - rear_camera
      - imu
      - gnss
      - lidar
    truth_mode: disabled
    deliverables:
      - rosbag2
      - calibration
      - aligned_pointcloud
      - synchronized_multiview_frames
      - actor_masks
      - dynamic_tracks
