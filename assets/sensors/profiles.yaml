profiles:
  ground_truth_control_baseline:
    description: CARLA truth or simplified perception for planning-control bring-up
    sensors:
      - front_camera
      - imu
      - gnss
      - lidar
    truth_mode: enabled
  production_perception:
    description: Production-like perception wiring for real stack validation
    sensors:
      - front_camera
      - surround_cameras
      - imu
      - gnss
      - lidar
      - radar
    truth_mode: disabled
  carla0915_high_fidelity:
    description: CARLA 0.9.15 / UE4.26 high-fidelity camera stack for perception and shadow validation
    sensors:
      - cinematic_front_camera
      - wide_front_camera
      - surround_cameras
      - imu
      - gnss
      - lidar
    truth_mode: shadow
  reconstruction_capture:
    description: Capture profile for public-road map refresh and static geometry reconstruction
    sensors:
      - front_camera
      - surround_cameras
      - imu
      - gnss
      - lidar
    truth_mode: disabled
    deliverables:
      - rosbag2
      - calibration
      - aligned_pointcloud
      - lanelet_candidate
  reconstruction_dense_multiview_capture:
    description: Dense multiview capture profile for future static and dynamic Gaussian-splatting reconstruction
    sensors:
      - front_camera
      - surround_cameras
      - rear_camera
      - imu
      - gnss
      - lidar
    truth_mode: disabled
    deliverables:
      - rosbag2
      - calibration
      - aligned_pointcloud
      - synchronized_multiview_frames
      - actor_masks
      - dynamic_tracks
