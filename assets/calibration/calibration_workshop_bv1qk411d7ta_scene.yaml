capture_contract:
  ego_motion: static_or_low_speed_creep
  minimum_capture_duration_sec: 30
  fiducial_board_style: dimensioned_single_qr_panel
  marker_count_per_board: 1
  opencv_detector: qrcode_detector_or_binary_fiducial_fallback
  required_static_targets: 12
  required_panel_geometry:
    panel_count: 12
    measured_corner_count_per_panel: 4
    expected_panel_size_m: [1.6, 1.6]
    expected_qr_size_m: 1.05
  expected_lidar_board_hit_targets: 8
  expected_camera_visible_targets: 4
  required_lidar_topics:
    - /sensing/lidar/top/pointcloud_before_sync
    - /sensing/lidar/rear_top/pointcloud_before_sync
    - /sensing/lidar/rear/pointcloud_before_sync
    - /sensing/lidar/left/pointcloud_before_sync
    - /sensing/lidar/right/pointcloud_before_sync
  required_output: runtime_verification/calibration/lidar_sensor_kit_extrinsic/calibration_result.json
validation_hook:
  scenario: scenarios/calibration/lidar_workshop_bv1qk411d7ta.yaml
  gate: evaluation/kpi_gates/lidar_sensor_kit_extrinsic.yaml
  metric_probe: ops/runtime_probes/lidar_calibration_metric_probe.py
  scene_spawner: stack/stable/carla_calibration_scene_spawner.py
missing_inputs:
  - Measured target dimensions and positions from the actual workshop.
  - CARLA or UE textured asset pack for real printable single-QR boards, lighting, and indoor bay walls.
  - QR detector adapter if the external calibration program remains AprilTag16h5-only.
  - Confirmation whether the external calibration algorithm expects static capture, low-speed creep, or multiple stop poses.
  - Physical survey of panel corner coordinates after installation.
rollback:
  action: Exclude the video-derived workshop scenario and keep the generic lidar_sensor_kit_extrinsic scenario.
  impact: Existing lidar calibration interface and planning-control scenarios remain unchanged.
