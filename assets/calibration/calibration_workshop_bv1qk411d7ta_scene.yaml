      pose:
        x: 8.5
        y: 0.0
        z: 1.25
        yaw_deg: 180.0
      size_m: [1.6, 1.6]
      material: matte_rigid_single_qr_panel_on_floor_stand
      panel:
        mount_type: front_rail_floor_stand
        expected_visibility: front_camera_and_front_lidar
        measured_pose_status: proxy_dimensioned
      marker:
        type: qr_code
        family: single_qr_fiducial_board
        marker_id: AUTO-CALIB-FRONT
