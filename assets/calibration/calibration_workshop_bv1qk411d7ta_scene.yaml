    anchor_id: calibration_town01_far_north_proxy_anchor
    min_distance_from_driving_test_spawn_m: 250.0
    must_not_overlap_with:
      - scenarios/l0/robobus117th_town01_closed_loop.yaml
      - scenarios/l1/regression_follow_lane.yaml
      - scenarios/l2/planning_control_merge_regression.yaml
      - scenarios/l2/planning_control_multi_actor_cut_in_lead_brake.yaml
      - scenarios/l2/planning_control_public_road_merge_regression.yaml
      - scenarios/l2/robobus117th_town01_close_cut_in_actor_bridge.yaml
    note: The full board layout is relative to ego, so the scenario anchor isolates the complete calibration bay from driving-regression routes.
  blocker_for_physical_fidelity: No measured indoor workshop map or calibration target coordinates have been imported yet.
layout_proxy:
  coordinate_frame: calibration_workshop_local
  units: meters
  bay_dimensions:
    length: 32.0
    width: 12.0
    height: 5.5
    status: assumption_from_calibration_bay_use_case
  environment_model:
    floor: flat_matte_concrete_with_painted_centerline
    wall_finish: light_gray_non_reflective
    lighting: uniform_overhead_industrial_led_proxy
    target_mounting: weighted_floor_stands_and_front_rear_rails
    traffic: closed_static_calibration_bay
  vehicle_stop_pose:
    x: 0.0
    y: 0.0
    z: 0.0
    yaw_deg: 0.0
    tolerance_m: 0.10
    tolerance_yaw_deg: 0.5
  floor_guides:
    centerline:
      type: painted_centerline
      x_range_m: [-12.0, 12.0]
      y_m: 0.0
    wheel_stop_zone:
      type: rectangular_stop_box
      center_xy_m: [0.0, 0.0]
      size_xy_m: [6.4, 2.8]
    lidar_reference_grid:
      type: painted_floor_reference_ticks
      x_ticks_m: [-8.0, -4.0, 0.0, 4.0, 8.0]
      y_ticks_m: [-4.0, -2.0, 2.0, 4.0]
  target_mounting_contract:
    panel_size_m: [1.6, 1.6]
    qr_print_size_m: 1.05
    lower_edge_height_m: 0.45
    normal_panel_center_height_m: 1.25
    upper_panel_center_height_m: 2.15
    frame_width_m: 0.06
    stand_type: twin_weighted_floor_stand_or_wall_rail
    measured_pose_required: true
static_calibration_targets:
