calibration_asset_id: lidar_sensor_kit_initial_perturbed
display_name: Robobus117th five-lidar initial guess for automatic calibration
owner: zmf
line: stable_candidate
source_truth: assets/calibration/lidar_sensor_kit_truth.yaml
coordinate_contract:
  parent_frame: sensor_kit_base_link
  units: meters_and_radians
  visibility: calibration_program_input
perturbation_policy:
  translation_delta_m: bounded_per_axis_under_0_08
  rotation_delta_deg: bounded_per_axis_under_1_0
  purpose: Ensure the calibration program has to recover from a known nonzero initial error.
