stack_id: novadrive
description: NovaDrive direct-CARLA validation stack without Autoware
software_versions:
  novadrive: 0.1.0
  carla: 0.9.15
  unreal_engine: 4.26
bootstrap:
  - name: prepare-ubuntu-host
    runner: bash
    command: "bash '{repo_root}/infra/ubuntu/bootstrap_host.sh' {execute_flag}"
start:
  - name: start-carla-server
    runner: bash
    background: true
    env:
      CARLA_0915_ROOT: "{carla_root}"
    command: "bash '{repo_root}/stack/stable/start_carla_host.sh' --run-dir '{run_dir}' --asset-root '{asset_root}' --slot-id '{slot_id}' --carla-port '{carla_rpc_port}' --traffic-manager-port '{traffic_manager_port}' --gpu-id '{gpu_id}' --cpu-affinity '{cpu_affinity}' --carla-map '{carla_map}' --render-mode '{carla_render_mode}' --res-x '{carla_res_x}' --res-y '{carla_res_y}' --quality-level '{carla_quality_level}' --extra-args '{carla_extra_args}' --display '{carla_display}' --xauthority '{carla_xauthority}' {execute_flag}"
  - name: wait-carla-rpc
    runner: bash
    background: false
    env:
      CARLA_0915_ROOT: "{carla_root}"
    command: "python3 '{repo_root}/stack/stable/wait_for_carla_rpc.py' --host '127.0.0.1' --port '{carla_rpc_port}' --timeout-sec '{carla_startup_timeout_sec}' --carla-root '{carla_root}'"
  - name: run-novadrive-direct-carla
    runner: bash
    background: false
    env:
      CARLA_0915_ROOT: "{carla_root}"
    command: "bash -lc 'PYTHONPATH=\"{repo_root}/src:$PYTHONPATH\" python3 -m novadrive.runtime.runner --scenario \"{scenario_path}\" --run-dir \"{run_dir}\" --mode \"{novadrive_runtime_mode}\" --carla-port \"{carla_rpc_port}\" --ego-vehicle-role-name \"{carla_ego_vehicle_role_name}\" --bevfusion-json \"{novadrive_bevfusion_json}\" --tick-sec \"{novadrive_tick_sec}\" --max-duration-sec \"{novadrive_max_duration_sec}\"'"
stop:
  - name: stop-novadrive-stack
    runner: bash
    command: "bash '{repo_root}/stack/stable/stop_stable_stack.sh' --run-dir '{run_dir}' --carla-port '{carla_rpc_port}' --traffic-manager-port '{traffic_manager_port}' --ros-domain-id '{ros_domain_id}' --rmw-implementation '{ros_rmw_implementation}' {execute_flag}"
replay:
  - name: replay-carla
    runner: bash
    command: "bash '{repo_root}/stack/stable/replay_carla_host.sh' '{carla_recorder_path}'"
