stack_id: stable
description: Stable validation stack for Autoware Universe main + CARLA 0.9.15 on the company Ubuntu host
software_versions:
  autoware_universe: main
  ros2: humble
  carla: 0.9.15
  unreal_engine: 4.26
bootstrap:
  - name: prepare-ubuntu-host
    runner: bash
    command: "bash '{repo_root}/infra/ubuntu/bootstrap_host.sh' {execute_flag}"
start:
  - name: start-carla-server
    runner: bash
    background: true
    command: "bash '{repo_root}/stack/stable/start_carla_host.sh' --run-dir '{run_dir}' --asset-root '{asset_root}' {execute_flag}"
  - name: start-autoware-bridge
    runner: bash
    background: true
    command: "bash '{repo_root}/stack/stable/start_bridge_host.sh' --scenario '{scenario_path}' --run-dir '{run_dir}' --asset-bundle '{asset_bundle_id}' {execute_flag}"
  - name: start-autoware-stack
    runner: bash
    background: true
    command: "bash '{repo_root}/stack/stable/start_autoware_host.sh' --scenario '{scenario_path}' --run-dir '{run_dir}' --asset-bundle '{asset_bundle_id}' {execute_flag}"
stop:
  - name: stop-autoware-stack
    runner: bash
    command: "bash '{repo_root}/stack/stable/stop_stable_stack.sh' {execute_flag}"
  - name: stop-carla-server
    runner: bash
    command: "pkill -f CarlaUE4 || true"
replay:
  - name: replay-rosbag
    runner: bash
    command: "bash -lc 'source /opt/ros/humble/setup.bash && ros2 bag play \"{rosbag_path}\" --clock'"
  - name: replay-carla
    runner: bash
    command: "bash '{repo_root}/stack/stable/replay_carla_host.sh' '{carla_recorder_path}'"
