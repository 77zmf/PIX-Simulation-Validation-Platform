    - bevfusion_tracks
    - bevfusion_occupancy
    - lane_graph_features
    - ego_history
  additional_representation:
    - vadv2_scene_tokens
  synchronization:
    time_base: stable_stack_sim_time
    perception_latency_budget_ms: 120
outputs:
  vectorized_scene: vadv2_scene_tokens
  trajectory: shadow_trajectory
  control: shadow_control
constraints:
  shadow_only: true
  requires_gate_pass_before_online: true
