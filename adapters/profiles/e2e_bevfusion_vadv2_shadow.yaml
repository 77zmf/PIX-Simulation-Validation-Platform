profile_id: e2e_bevfusion_vadv2_shadow
type: e2e
description: Public-road BEVFusion plus VADv2 shadow planner for uncertainty-aware comparison
baseline: e2e_bevfusion_uniad_shadow
contract_version: 2026q2-shadow-v1
research_focus:
  - uncertainty_aware_planning
  - vectorized_scene_interaction
  - shadow_divergence_reduction
inputs:
  sensors: production_perception_or_carla0915_high_fidelity
  map: lanelet2_or_hd_map
  perception: perception_bevfusion_public_road
