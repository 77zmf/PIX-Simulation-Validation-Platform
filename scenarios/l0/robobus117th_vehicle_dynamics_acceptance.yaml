    - ops/runtime_probes/carla_vehicle_dynamics_probe.py
    - evaluation/kpi_gates/robobus117th_vehicle_dynamics_acceptance.yaml
  validation_method: Start the stable stack, then briefly apply direct CARLA VehicleControl to the PIX robobus ego actor before route-control validation. This isolates low-level blueprint drivability and actor persistence from Autoware planning/control.
  validation_command: >
    python3 ops/runtime_probes/carla_vehicle_dynamics_probe.py
    --run-dir <run_dir>
    --profile robobus117th_vehicle_dynamics
    --actor-id vehicle.pixmoving.robobus
    --ego-role-name ego_vehicle
    --reset-pose
    --throttle 0.9
    --throttle-duration-sec 12.0
    --min-delta-m 2.0
    --min-speed-mps 1.0
  expected_observable: The live vehicle.pixmoving.robobus ego actor remains present, advances synchronous CARLA ticks under direct throttle, moves at least 2m, reaches at least 1.0m/s, then is braked to a safe stop.
  rollback_impact: Remove this L0 gate from required campaigns; it does not change Autoware, CARLA assets, or stack startup behavior.
