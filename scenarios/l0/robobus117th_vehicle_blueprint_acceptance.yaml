  validation_method: Non-destructive CARLA runtime inspection of the live PIX robobus ego actor after the stable bridge has spawned it; checks blueprint id, pose height, bounding box/collision proxy plausibility, wheel geometry/steer limits, and attached production sensor actor counts.
  validation_command: >
    python3 ops/runtime_probes/carla_vehicle_blueprint_probe.py
    --run-dir <run_dir>
    --profile robobus117th_vehicle_blueprint
    --actor-id vehicle.pixmoving.robobus
    --ego-role-name ego_vehicle
    --min-bbox-extent-x-m 1.0
    --min-bbox-extent-y-m 0.4
    --min-bbox-extent-z-m 0.4
    --min-attached-sensors 13
    --min-attached-cameras 6
    --min-attached-lidars 5
  expected_observable: CARLA blueprint library contains vehicle.pixmoving.robobus; one ego actor with role_name ego_vehicle is live; bbox extents are plausible for a driveable vehicle; wheel radius/wheelbase/tread/steer limits match 117th metadata; 6 cameras, 5 lidars, IMU, and GNSS are attached to the ego actor.
  known_current_gap: As of 2026-05-11 the live vehicle spawns and direct throttle passes. CARLA 0.9.15 runtime physics APIs do not expose wheel width, so wheel width must be verified in UE4 source via assets/vehicles/robobus117th/unreal/inspect_robobus_wheel_blueprints.py instead of this runtime gate.
  rollback_impact: Remove this scenario from required campaigns or temporarily use the non-strict direct actor drive gate; existing planning/control scenarios remain unchanged.
