scenario_id: stable_l1_robobus117th_town01_speed40_probe
stack: stable
map_id: Town01
asset_bundle: carla_town01
ego_init:
  pose:
    x: 120.0
    y: -133.465
    z: 0.0
    yaw_deg: 0.0
goal:
  pose:
    x: 315.0
    y: -133.465
    z: 0.0
    yaw_deg: 0.0
traffic_profile:
  mode: empty_speed40_probe
  vehicles: 0
  pedestrians: 0
weather_profile:
  preset: ClearNoon
sensor_profile: robobus_pixrover14_application_topology
algorithm_profile: planning_control_baseline
seed: 140
recording:
  rosbag2:
    enabled: true
    path: rosbags/speed40_probe
  carla_recorder:
    enabled: true
    path: carla/speed40_probe.log
kpi_gate: planning_control_speed40_probe
labels:
  - L1
  - stable
  - robobus117th
  - speed40
  - route_follow
  - regression
  - simulation_fidelity
metadata:
  owner: zmf
  source_assets:
    - scenarios/l1/regression_follow_lane.yaml
    - ops/runtime_probes/carla_closed_loop_route_probe.py
    - evaluation/kpi_gates/planning_control_speed40_probe.yaml
  validation_method: Run the stable stack with the PIX robobus on the valid long Town01 lanelet 1071 straight segment, use the route-follow-only planning preset to isolate vehicle/control fidelity from traffic-rule stops, publish a 40km/h velocity target through the closed-loop route probe evidence path, and require both route closure and target-speed evidence.
  validation_command: >
    python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 1.5
    --max-duration-sec 150
    --sample-period 0.2
    --target-speed-mps 11.111111
    --target-speed-tolerance-mps 0.5
    --camera-video-output <run_dir>/runtime_verification/speed40_route_sync.mp4
    --camera-video-mode ego_chase
    --disable-goal-modification
  expected_observable: The PIX robobus accepts the valid Town01 lanelet 1071 route, reaches at least 10.6m/s during the run, stays within lane envelope, and closes the route with stable control without default traffic-rule modules stopping the vehicle before the fidelity target.
  known_current_gap: "As of 2026-05-12, steering status sign alignment and CARLA angular-velocity unit conversion are fixed and verified in bridge evidence. The best pre-physics-tuning runtime trial reached 39.95km/h with max roll about 2.0deg and x≈265m, but still stopped about 49m before the goal with lateral error about 1.05m. A narrower steering response trial with pix_carla_steer_tau=0.05 reached 40.20km/h but regressed to lateral error about 1.84m and max roll about 5.1deg, so the scenario keeps default steering tau. After the angular-rate fix, the vehicle still rolled/drifted lane-out. The first runtime physics trial reached 39.71km/h and improved lateral error to about 0.765m, but triggered a collision-like transient near x≈205m with max roll about 22.7deg and yaw about 51deg; backing off sweep wheel collision reduced max roll to about 11.8deg but exposed a control-to-CARLA steer direction issue. A direct positive steer gain of 0.25 was unsafe, causing max roll about 94deg, while gain 0.08 stayed kinematically sane and reached target speed but stopped about 45.6m before goal with lateral error about 1.94m. This revision keeps conservative physics and uses bounded steering output for the next fidelity validation. The remaining blocker should stay classified as simulation fidelity / bridge dynamics until the vehicle model response matches the real-car planning behavior."
  rollback_impact: Keep scenarios/l1/regression_follow_lane.yaml as the required route-follow gate and leave this scenario as a non-blocking speed regression until it passes repeatedly.
