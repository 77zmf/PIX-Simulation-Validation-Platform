    - scenarios/l2/planning_control_roadtest_trajectory_jump_replay_draft.yaml
    - scenarios/l2/planning_control_multi_actor_cut_in_lead_brake.yaml
    - stack/stable/carla_actor_object_bridge.py
    - ops/runtime_probes/carla_sensor_topic_probe.py
    - ops/runtime_probes/carla_dynamic_actor_probe.py
    - /Users/cyber/Documents/zmf_test-data/mac_handoff/117th_20260421_1452_trajectory_jump/analysis_report.md
    - /Users/cyber/Documents/zmf_test-data/mac_handoff/117th_20260427_1004_trajectory_issue/rd_handoff.md
    - /Users/cyber/Documents/zmf_test-data/mac_handoff/82th_20260508_1438_dangerous_forced_lane_change
  validation_method: Run the stable stack with CARLA actor object bridge enabled, verify robobus117th sensor topic samples, then execute the multi-actor cut-in plus static lead blocker probe as the deterministic forced-lane-change surrogate.
  validation_command: >
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th
    --continue-on-failure
    &&
    python3 ops/runtime_probes/carla_dynamic_actor_probe.py
    --run-dir <run_dir>
    --kind l2_multi_actor_cut_in_lead_brake
    --perception-source actor_bridge
    --camera-video-output <run_dir>/runtime_verification/planning_forced_lane_change_static_obstacle.mp4
    --camera-video-mode overview
    --reaction-speed-ratio 0.65
    --no-rosbag
  expected_observable: Robobus117th sensor topics have live samples; actor bridge publishes at least two non-ego actors; ego yields or slows for a static blocker plus adjacent cut-in without collision, unsafe TTC, or loss of actor-object stream.
  missing_inputs: Exact public-road lane-change route and recorded actor tracks are not part of this surrogate; promote to a public-road fixture after the route section is converted.
  rollback_impact: Remove this scenario from ops/test_campaigns/stable_planning_failcase_surrogates.yaml; existing multi-actor and replay-draft scenarios remain unchanged.
