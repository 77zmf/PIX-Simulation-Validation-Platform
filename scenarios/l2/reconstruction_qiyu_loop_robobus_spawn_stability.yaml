  validation_method: CARLA-only qiyu custom-map spawn stability sweep for vehicle.pixmoving.robobus. The probe starts CARLA on a bootstrap Town01 map, loads the qiyu_rp10 custom map through the Python API, spawns the robobus at the formal route-smoke start pose, then tries baseline and runtime physics diagnostic variants before reporting whether any variant remains upright and driveable.
  validation_command: >
    python3 ops/runtime_probes/carla_vehicle_spawn_stability_probe.py
    --run-dir <run_dir>
    --profile robobus117th_qiyu_spawn_stability
    --carla-map /Game/qiyu_rp10/Maps/qiyu_rp10/qiyu_rp10
    --actor-id vehicle.pixmoving.robobus
    --ego-role-name ego_vehicle
    --spawn-x 103.340
    --spawn-y 636.097
    --spawn-z -3.1021
    --spawn-yaw-deg 178.90
    --spawn-z-offsets -0.5,0.0,0.5,1.0
    --com-z-cm-values=-50,-100,-200
    --mass-kg 12000
    --settle-ticks 100
    --drive-ticks 60
    --throttle 0.35
    --max-abs-pitch-deg 12
    --max-abs-roll-deg 12
    --min-z-m=-20
    --min-delta-m 1.0
    --min-speed-mps 0.5
  expected_observable: At least one vehicle.pixmoving.robobus spawn/physics variant remains upright on the qiyu road deck, stays above the minimum z bound, and moves under direct CARLA throttle. The spawn z was corrected from -0.1021 (airborne) to -3.1021 (road deck) with a symmetric z-offset sweep to tolerate local mesh height variation.
  rollback_impact: This scenario is CARLA-only and does not change runtime assets. Remove it from required campaigns if the formal robobus qiyu acceptance is deferred; the Lincoln surrogate smoke remains the map/control closure fallback.
