  validation_method: Execute a bounded stable-stack smoke on the qiyu_rp10 CARLA 0.9.15 overlay using the full dynobs-frame Lanelet2 candidate after adding participant:vehicle=yes and swapping road left/right roles to match the westbound lane semantics. This isolates whether the previous empty-route response was caused by invalid lanelet semantics rather than CARLA mesh, robobus physics, bridge startup, or localization.
  validation_command: >
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_route_smoke_core
    --continue-on-failure
    &&
    timeout 240 python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 12.0
    --min-duration-sec 0.0
    --max-duration-sec 60
    --sample-period 0.25
    --carla-y-sign 1
    --carla-z-offset 0.5
    --skip-ego-reset
    --max-speed-mps-for-pass 25
    --min-ego-z-m-for-pass -20
    --max-abs-pitch-deg-for-pass 30
    --max-abs-roll-deg-for-pass 30
    --stop-ego-after-goal
  expected_observable: CARLA loads the qiyu_rp10 custom map, the PIX robobus remains upright on the road deck, Autoware accepts the bounded westbound route on the full dynobs-frame vehicle-bounds candidate map, the ego moves westbound, reaches the mid-route goal tolerance before the known x=-58m collision gap, and finalization produces route, sensor, and kinematic sanity KPIs.
  acceptance_boundary: Candidate semantic-map smoke only. It proves the full dynobs-frame Lanelet2 map can become routable after vehicle participant tags and road left/right bounds are corrected, and that the robobus can close a bounded route before the observed x=-58m CARLA mesh/collision drop. It does not yet prove the full long-loop route or dynamic actor replay.
  rollback_impact: Remove this scenario and the generated /data/pix/assets/site_gy_qyhx_gsh20260310_carla_dynobs_frame_vehicle_bounds_candidate directory; keep the original dynobs-frame map unchanged.
