    - /home/pixmoving/CARLA_0.9.15/Co-Simulation/Sumo/examples/Town01.sumocfg
    - /home/pixmoving/CARLA_0.9.15/Co-Simulation/Sumo/examples/rou/Town01.rou.xml
    - /home/pixmoving/CARLA_0.9.15/Co-Simulation/Sumo/examples/net/Town01.net.xml
    - /home/pixmoving/PIX-Simulation-Validation-Platform/runs/manual_sumo_assets/town01_reduced20/Town01.reduced20.sumocfg
  validation_method: Start CARLA Town01 with reduced SUMO traffic, verify SUMO/CARLA actor synchronization and Autoware object/control streams, capture lightweight NPC visual evidence, then drive the PIX robobus along the follow-lane route. This isolates planning/control behavior from the dense SUMO host-pressure failure.
  validation_command: >
    python3 ops/runtime_probes/sumo_cosim_probe.py
    --run-dir <run_dir>
    --profile town01_sumo_reduced_route_follow
    --sumo-config-file /home/pixmoving/PIX-Simulation-Validation-Platform/runs/manual_sumo_assets/town01_reduced20/Town01.reduced20.sumocfg
    --actor-source carla-rpc
    --min-actors 6
    --wait-sec 12
    --log-wait-timeout-sec 25
    --carla-actor-wait-sec 8
    --carla-actor-poll-sec 0.5
    &&
    python3 ops/runtime_probes/carla_actor_visual_capture.py
    --run-dir <run_dir>
    --profile town01_sumo_reduced_route_follow_visual
    --carla-root /home/pixmoving/CARLA_0.9.15
    --carla-port 2000
    --ego-role-name ego_vehicle
    --npc-role-name sumo_driver
    --npc-role-prefix sumo
    --min-npcs 4
    --min-captures 6
    --max-npcs 6
    --image-width 960
    --image-height 540
    --actor-poll-timeout-sec 20
    --worker-timeout-sec 240
    &&
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_presence_smoke
    &&
    python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 0.8
    --max-duration-sec 150
    --sample-period 0.2
    --ego-start-clear-radius-m 35
    --ego-start-clear-duration-sec 30
    --skip-ego-reset
    --camera-video-output <run_dir>/runtime_verification/sumo_reduced_route_follow.mp4
    --camera-video-mode ego_chase
  expected_observable: SUMO reports at least six synchronized NPC vehicles, CARLA visual evidence captures at least four NPCs, Autoware object/control streams are alive, and the PIX robobus either reaches the follow-lane goal or generates a KPI-gated planning/control bugpack without hitting the dense-SUMO memory pressure seen in the 60-vehicle scenario.
  runtime_gap: Generated reduced SUMO net/route/sumocfg files are external run assets under runs/manual_sumo_assets and must be created on the Ubuntu host before execution.
  rollback_impact: Remove this scenario and gate; the original dense SUMO scenario remains unchanged.
