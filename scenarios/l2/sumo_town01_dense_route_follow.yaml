    - /home/pixmoving/CARLA_0.9.15/Co-Simulation/Sumo/examples/net/Town01.net.xml
  validation_method: Start CARLA Town01 with dense SUMO traffic, verify SUMO/CARLA actor synchronization and Autoware object/control streams, reserve the ego start ahead of the early SUMO flow near x=228m, wait long enough for CARLA actors to catch up with SUMO's active vehicle count, capture dense NPC visual evidence, then drive the PIX robobus along the follow-lane route to produce planning/control bug evidence under traffic pressure.
  validation_command: >
    python3 ops/runtime_probes/sumo_cosim_probe.py
    --run-dir <run_dir>
    --profile town01_sumo_dense_route_follow
    --sumo-config-file /home/pixmoving/CARLA_0.9.15/Co-Simulation/Sumo/examples/Town01.sumocfg
    --actor-source carla-rpc
    --min-actors 12
    --wait-sec 25
    --log-wait-timeout-sec 45
    --carla-actor-wait-sec 25
    --carla-actor-poll-sec 0.5
    &&
    python3 ops/runtime_probes/carla_actor_visual_capture.py
    --run-dir <run_dir>
    --profile town01_sumo_dense_route_follow_visual
    --carla-root /home/pixmoving/CARLA_0.9.15
    --carla-port 2000
    --ego-role-name ego_vehicle
    --npc-role-name sumo_driver
    --npc-role-prefix sumo
    --min-npcs 8
    --min-captures 12
    --max-npcs 12
    --image-width 960
    --image-height 540
    --actor-poll-timeout-sec 35
    --worker-timeout-sec 360
    &&
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_presence_smoke
    &&
    python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 0.8
    --max-duration-sec 180
    --sample-period 0.2
    --ego-start-clear-radius-m 45
    --ego-start-clear-duration-sec 70
    --skip-ego-reset
    --camera-video-output <run_dir>/runtime_verification/sumo_dense_route_follow.mp4
    --camera-video-mode ego_chase
  expected_observable: SUMO reports at least 12 synchronized NPC vehicles, CARLA visual evidence captures at least eight SUMO NPCs, Autoware object/control streams are alive, ego starts on the validated Town01 lane away from immediate SUMO overlap, and the PIX robobus either reaches the follow-lane goal or generates a KPI-gated planning/control bugpack.
  rollback_impact: Remove this scenario from ops/test_campaigns/stable_planning_control_bughunt.yaml or set stable_runtime.sumo_enabled=false; existing CARLA-only planning/control scenarios remain unchanged.
