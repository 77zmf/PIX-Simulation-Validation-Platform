  validation_method: Run the qiyu dynobs CARLA custom map with the CARLA-frame Lanelet2 candidate, then verify robobus117th sensor topics and a short empty-route Autoware planning/control smoke on road 37719.
  validation_command: >
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_l0_closed_loop
    --continue-on-failure
    &&
    python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 8.0
    --max-duration-sec 150
    --camera-video-output <run_dir>/runtime_verification/qiyu_loop_dynobs_autoware_route_smoke.mp4
    --camera-video-mode ego_chase
  expected_observable: CARLA loads the dynobs qiyu custom map, the bridge spawns the PIX robobus on road 37719, Autoware loads the CARLA-frame Lanelet2 candidate, accepts the short route, publishes trajectory/control, and the ego reaches the route goal without collision.
  rollback_impact: Remove this scenario and the generated /data/pix/assets/site_gy_qyhx_gsh20260310_carla_dynobs_frame directory; the already validated CARLA-only dynobs import smoke remains available.
