    - /data/pix/workspaces/zmf_ws/source_toolchain/carla-0.9.15/Import/qiyu_rp14/qiyu_rp14.fbx
    - /data/pix/workspaces/zmf_ws/source_toolchain/carla-0.9.15/Import/qiyu_rp14/qiyu_rp14.xodr
    - /data/pix/reconstruction/runs/qiyu_loop_20260430_105120_carla_import_bundle/qiyu_rp14_wide_lanelet_height_build_20260502T160911Z/status.txt
  validation_method: >
    Start CARLA from the qiyu_rp14 CARLA 0.9.15 overlay runtime on the
    Town01 bootstrap map, then let the bridge/API load the qiyu_rp14 packaged
    custom map. The scenario uses the vehicle-bounds candidate Lanelet2 map
    because the original dynobs-frame map returns an empty route for the long
    westbound goal. The qiyu_rp14 direct-goal route is intentionally left
    without intermediate waypoints: the previous multi-point route selected an
    unstable lane around x=-80m, while the direct-goal route accepted
    SetRoutePoints and closed with route_completion=1.0 in the
    20260503T141049Z Ubuntu-host run. Video is intentionally disabled in the
    primary validation command; closed-loop KPI evidence must be written before
    media capture is added back.
  validation_command: >
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_route_smoke_core
    --continue-on-failure
    &&
    timeout 600 python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 12.0
    --min-duration-sec 0.0
    --max-duration-sec 150
    --sample-period 0.25
    --carla-y-sign 1
    --carla-z-offset 0.5
    --skip-ego-reset
    --max-speed-mps-for-pass 25
    --min-ego-z-m-for-pass -20
    --max-abs-pitch-deg-for-pass 30
    --max-abs-roll-deg-for-pass 30
    --stop-ego-after-goal
  expected_observable: >
    CARLA starts on the Town01 bootstrap map from the qiyu_rp14 overlay
    runtime, the bridge loads the qiyu_rp14 packaged custom map, then spawns
    the PIX robobus upright on the positive-Y road start with the route-smoke
    core sensor bundle. Autoware loads the vehicle-bounds candidate Lanelet2
    map, accepts the direct westbound goal route, publishes trajectory/control,
    and the ego reaches the route goal without collision.
  rollback_impact: Restore the previous qiyu_rp10 CARLA map and original dynobs-frame Lanelet2 asset; the already validated bounded vehicle-bounds candidate smoke remains available.
