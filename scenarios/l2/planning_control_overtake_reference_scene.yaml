metadata:
  owner: planning-control
  scene_objective: Video-style CARLA multi-lane overtake pressure scene based on the user reference recording and the 82th dangerous forced lane-change evidence.
  source_assets:
    - /Users/cyber/Desktop/录屏2026-05-11 02.06.17.mov
    - assets/manifests/planning_road_test_failcases_202605.yaml
    - scenarios/l2/planning_control_roadtest_forced_lane_change_replay_draft.yaml
    - ops/runtime_probes/carla_dynamic_actor_probe.py
    - ops/runtime_probes/carla_sensor_topic_probe.py
    - stack/stable/carla_actor_object_bridge.py
  validation_method: Run the stable stack with CARLA actor object bridge enabled, spawn a four-vehicle multi-lane overtake-pressure scene, capture overview video evidence, and gate on sensor samples, object stream, dynamic response, collision, and TTC.
  validation_command: >
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th
    --continue-on-failure
    &&
    python3 ops/runtime_probes/carla_dynamic_actor_probe.py
    --run-dir <run_dir>
    --kind l2_overtake_reference
    --perception-source actor_bridge
    --spectator-mode ego_chase
    --camera-video-output <run_dir>/runtime_verification/planning_control_overtake_reference_scene.mp4
    --camera-video-mode ego_chase
    --reaction-speed-ratio 0.85
    --no-rosbag
  expected_observable: The recorded CARLA video should show ego, a slow lead vehicle, adjacent-lane vehicles, and a far lead vehicle in the same frame; Autoware object stream should observe at least three NPC actors and produce a speed/yield response without collision or unsafe TTC.
  visual_style_contract:
    camera: ego chase view, similar to the reference video
    required_elements:
      - ego robobus visible
      - multiple NPC cars visible in adjacent lanes
      - forward route motion visible
      - Autoware object stream nonempty
      - generated mp4 saved under runtime_verification
  limitation: Town01 straight-road surrogate; it is executable on the stable host but does not yet reproduce the exact public-road lane geometry from the 82th case.
  promotion_path:
    - extract public-road route and actor tracks from the 82th MCAP package
    - convert route section into a CARLA/OpenDRIVE or validated site-proxy fixture
    - reuse this same validation_command pattern with the public-road asset bundle
  rollback_impact: Remove this scenario from campaigns; existing follow-lane, merge, SUMO, and road-test replay scenarios remain unchanged.
