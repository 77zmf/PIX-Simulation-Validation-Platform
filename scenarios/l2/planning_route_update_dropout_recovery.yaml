metadata:
  owner: planning-control
  surrogate_scope: Town01 route-continuity surrogate for no-trajectory, trajectory-disappeared, and route-empty road-test symptoms.
  source_assets:
    - assets/manifests/planning_road_test_failcases_202604.yaml
    - scenarios/l2/planning_control_roadtest_trajectory_dropout_replay_draft.yaml
    - scenarios/l1/regression_follow_lane.yaml
    - ops/runtime_probes/carla_sensor_topic_probe.py
    - ops/runtime_probes/carla_closed_loop_route_probe.py
    - /Users/cyber/Documents/zmf_test-data/mac_handoff/117th_20260421_1456_no_trajectory/rd_handoff.md
    - /Users/cyber/Documents/zmf_test-data/mac_handoff/117th_20260422_1103_trajectory_disappeared/rd_handoff.md
    - /Users/cyber/Documents/zmf_test-data/mac_handoff/117th_20260422_1647_route_empty_no_trajectory/analysis_report.md
  validation_method: Run a deterministic Town01 route with via points and strict goal modification disabled, then use route/control telemetry as the executable continuity check while the public-road route-empty fixture is still blocked on map topology reproduction.
  validation_command: >
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_l0_closed_loop
    --continue-on-failure
    &&
    python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 0.8
    --min-duration-sec 20
    --max-duration-sec 180
    --sample-period 0.2
    --disable-goal-modification
    --stop-ego-after-goal
    --camera-video-output <run_dir>/runtime_verification/planning_route_update_dropout_recovery.mp4
    --camera-video-mode ego_chase
  expected_observable: Autoware accepts a via-point route, continuously publishes trajectory/control, keeps bounded lane and goal error, and reaches the goal without a trajectory publication dropout during the probe window.
  missing_inputs: This surrogate does not inject an Autoware restart or true route-empty lanelet topology yet; the exact public-road route-empty case still requires a converted lanelet/OpenDRIVE fixture.
  rollback_impact: Remove this scenario from ops/test_campaigns/stable_planning_failcase_surrogates.yaml; the existing L1 follow-lane scenario remains the route-follow baseline.
