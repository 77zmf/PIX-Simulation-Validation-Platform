  source_assets:
    - assets/manifests/site_gy_qyhx_gsh20260310_carla_dynobs_frame.yaml
    - /data/pix/assets/qiyu_rp10_minimal_westbound_route_map/lanelet2_map.osm
    - /data/pix/assets/qiyu_rp10_minimal_westbound_route_map/map_projector_info.yaml
    - /data/pix/workspaces/zmf_ws/source_toolchain/carla-0.9.15/Import/qiyu_rp10/qiyu_rp10.fbx
    - /data/pix/workspaces/zmf_ws/source_toolchain/carla-0.9.15/Import/qiyu_rp10/qiyu_rp10.xodr
    - assets/sensors/carla/robobus117th_route_smoke_objects.json
    - ops/runtime_probes/carla_sensor_topic_probe.py
    - ops/runtime_probes/carla_closed_loop_route_probe.py
  validation_method: Execute a bounded stable-stack smoke on the qiyu_rp10 CARLA 0.9.15 overlay using the minimal westbound Lanelet2 route and a Lincoln CARLA vehicle as a physics surrogate. This is not formal robobus acceptance; it exists to keep the map, Autoware route service, localization bridge, control bridge, KPI finalization, report, and replay chain repeatable while the PIX robobus CARLA PhysicsAsset/collision issue is isolated.
  validation_command: >
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_route_smoke_core
    --continue-on-failure
    &&
    timeout 120 python3 ops/runtime_probes/carla_closed_loop_route_probe.py
    --run-dir <run_dir>
    --goal-tolerance-m 14.0
    --min-duration-sec 0.0
    --max-duration-sec 16
    --sample-period 0.25
    --carla-y-sign 1
    --carla-z-offset 0.5
    --max-speed-mps-for-pass 25
    --min-ego-z-m-for-pass -20
    --max-abs-pitch-deg-for-pass 30
    --max-abs-roll-deg-for-pass 30
    --stop-ego-after-goal
  expected_observable: CARLA loads the qiyu_rp10 custom map, Autoware accepts the minimal westbound route, the ego moves westbound on the road deck, reaches the mid-route goal tolerance without collision, and finalization produces route, sensor, and kinematic sanity KPIs that pass planning_control_smoke_kinematic_sanity.
  acceptance_boundary: Surrogate map/control smoke only. The 14m goal tolerance is intentionally wide for first closure; formal robobus acceptance remains blocked on the robobus spawn stability issue on the qiyu mesh.
  rollback_impact: Remove this surrogate scenario and gate; the formal robobus qiyu route-smoke scenario remains the stable acceptance target once vehicle physics is fixed.
