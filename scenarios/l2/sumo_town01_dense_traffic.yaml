  validation_method: Start CARLA Town01, run the official CARLA SUMO synchronization wrapper with the Town01 route set, require dense SUMO traffic in co-sim logs, expose background vehicles through the actor object bridge, capture multiple NPC visual samples, then finalize through the SUMO dense KPI gate.
  validation_command: >
    python3 ops/runtime_probes/sumo_cosim_probe.py
    --run-dir <run_dir>
    --profile town01_sumo_dense
    --sumo-config-file /home/pixmoving/CARLA_0.9.15/Co-Simulation/Sumo/examples/Town01.sumocfg
    --actor-source carla-rpc
    --min-actors 12
    --wait-sec 25
    --log-wait-timeout-sec 45
    --carla-actor-wait-sec 25
    --carla-actor-poll-sec 0.5
    &&
    python3 ops/runtime_probes/carla_actor_visual_capture.py
    --run-dir <run_dir>
    --profile town01_sumo_dense_visual
    --carla-root /home/pixmoving/CARLA_0.9.15
    --carla-port 2000
    --ego-role-name ego_vehicle
    --npc-role-name sumo_driver
    --npc-role-prefix sumo
    --min-npcs 8
    --min-captures 12
    --max-npcs 12
    --image-width 960
    --image-height 540
    --actor-poll-timeout-sec 35
    --worker-timeout-sec 360
    &&
    python3 ops/runtime_probes/carla_sensor_topic_probe.py
    --run-dir <run_dir>
    --profile robobus117th_presence_smoke
  expected_observable: CARLA visual output shows the PIX ego vehicle with at least eight SUMO-synchronized NPC vehicles; Autoware receives non-empty object/control streams through the actor bridge, and SUMO co-sim evidence reports at least 12 active traffic actors.
  rollback_impact: Disable this scenario or set stable_runtime.sumo_enabled=false; the L1 SUMO smoke and CARLA-only stable scenarios remain unaffected.
